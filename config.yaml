# ============================================================
# 全量配置（Agent + MCP Server 一体，本地 stdio 模式）
# 适用于：MCP Server 和 Agent 在同一进程，无需远程部署
# ============================================================

# 数据库集群
clusters:
  test:
    description: "测试环境"
    host: "${DB_TEST_HOST}"
    port: 3306
    database: "avatar-test2"
    user: "readonly_user"
    password: "${DB_TEST_PASSWORD}"
  production:
    description: "生产环境"
    host: "${DB_PROD_HOST}"
    port: 3306
    database: "avatar"
    user: "readonly_user"
    password: "${DB_PROD_PASSWORD}"

# SQL 安全策略
sql_security:
  max_rows: 100
  query_timeout: 30
  allowed_tables:
    - "tb_scene"
    - "tb_scene_app"
    - "tb_scene_customer"
    - "tb_scene_voice"
    - "tb_model"
    - "tb_model_scene"
    - "tb_train"
    - "tb_train_log"
    - "tb_live"
    - "tb_live_config"
    - "tb_live_category"
    - "tb_voice"
    - "tb_background"
    - "tb_base_video"
    - "tb_app"
    - "tb_channel"
    - "tb_channel_dept"
    - "tb_docker_version"
    - "tb_category"
    - "tb_answer"
    - "tb_content_category"
    - "tb_content_scene"
    - "tb_paas_live"
    - "tb_tts_task"

# 业务领域知识
business_knowledge:
  description: "数字人平台"
  term_mappings:
    "模型": "tb_model 表"
    "形象/数字人": "tb_scene 表（包含训练状态、分辨率等详细信息）"
    "训练/训练任务": "tb_train 表"
    "音色": "tb_voice 表"
    "直播间": "tb_live 表"
    "背景": "tb_background 表"
    "应用/App": "tb_app 表"
    "渠道/租户": "tb_channel 表"
  table_relationships:
    - "tb_scene.model_id → tb_model.id（形象属于某个数字人模型）"
    - "tb_scene.train_id → tb_train.id（形象关联训练任务）"
    - "tb_scene_app.scene_id → tb_scene.id（数字人与app的关联）"
    - "tb_scene_voice.scene_id → tb_scene.id（数字人与音色的关联）"
    - "tb_scene_voice.voice_id → tb_voice.id"
    - "tb_live.scene_id → tb_scene.id（直播间使用的形象）"
    - "tb_scene.docker_version_id → tb_docker_version.id"
  status_codes:
    - "tb_scene.status: 1=训练中, 2=训练成功, 3=训练失败"
    - "tb_scene.type: 1=视频型, 2=图片型"
    - "tb_scene.forbidden_status: 1=正常, 2=禁用"
    - "tb_scene.visibility: 1=公用, 2=定制"
    - "tb_train.status: 0=未开始, 1=训练中, 2=成功, 3=失败"
    - "tb_live.status: 1=编辑中, 2=审核中, 3=审核失败, 4=生成中, 5=生成失败, 6=待开播"
    - "tb_model.sex: 1=男, 2=女"
  custom_rules: []

# 鉴权配置（本地 stdio 模式不需要鉴权，此处为示例）
auth:
  api_key: ""  # 设为 "${MCP_API_KEY}" 启用鉴权

# Agent 配置
agent:
  provider: "anthropic"                # "anthropic" 或 "openai_compatible"
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  default_cluster: "test"
  # api_key: ""                        # 留空则从环境变量 ANTHROPIC_API_KEY 读取
  # base_url: ""                       # 仅 openai_compatible 模式需要
